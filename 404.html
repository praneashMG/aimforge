    <style>
        /* Base Animations */

            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0; /* Start hidden */
            animation-fill-mode: forwards;
        }

        /* Scrollbar aesthetics */
        body::-webkit-scrollbar {
            width: 8px;
        }
        body::-webkit-scrollbar-track {
            background: transparent;
        }
        body::-webkit-scrollbar-thumb {
            background-color: #7A1E2C; /* Secondary Red */

        }
        .dark body::-webkit-scrollbar-thumb {
            background-color: #0B1D2A; /* Primary Blue */
            border: 1px solid #122230;
        }
    </style>
</head>

    <div class="py-6 text-center text-xs text-primary dark:text-warmgray font-medium fade-in" style="animation-delay: 0.8s;">

    <div class="absolute top-0 left-0 w-64 h-64 bg-secondary/20 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-primary/10 dark:bg-secondary/10 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

    <script>
        const htmlElement = document.documentElement;
        const themeToggle = document.getElementById("themeToggle");
        const rtlToggle = document.getElementById("rtlToggle");

        // Set default to dark theme for AimForge if no local storage is found
        if (!localStorage.getItem('theme')) {
            localStorage.setItem('theme', 'dark');
        }

        // ✅ THEME TOGGLE LOGIC (AimForge Sync)
        function toggleDarkMode() {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            htmlElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // Sync the icon
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) {
                themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            }
        }

        if (themeToggle) themeToggle.addEventListener("click", toggleDarkMode);

        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        const themeIcon = document.getElementById('theme-icon');
        
        if (savedTheme === 'dark') {
            htmlElement.classList.add("dark");
            htmlElement.setAttribute('data-theme', 'dark');
            if (themeIcon) themeIcon.className = 'fas fa-sun';
        } else {
            htmlElement.classList.remove("dark");
            htmlElement.setAttribute('data-theme', 'light');
            if (themeIcon) themeIcon.className = 'fas fa-moon';
        }

        // ✅ RTL TOGGLE LOGIC
        function toggleRTL() {
            const current = htmlElement.getAttribute("dir") || "ltr";
            const next = current === "rtl" ? "ltr" : "rtl";
            htmlElement.setAttribute("dir", next);
            localStorage.setItem("direction", next);
        }
        
        if (rtlToggle) rtlToggle.addEventListener("click", toggleRTL);
        
        if (localStorage.getItem("direction") === "rtl") {
            htmlElement.setAttribute("dir", "rtl");
        }
    </script>

</body>
